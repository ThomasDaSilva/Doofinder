{getExcludeProduct product_id=$product_id}

<div>
    <div class="form-group ">
        <label for="is_excluded" class="control-label">{intl l="Doofinder Search Engine" d="doofinder.bo.default"}</label>
        <div class="checkbox">
            <label>
                <input type="checkbox" id="is_excluded" name="{$name|default:""}" value="1" {if $isExclude}checked="checked"{/if}>
                {intl l="This product is exclude from Doofinder Search Engine" d="doofinder.bo.default"}
            </label>
        </div>
    </div>
</div>

{block name="javascript-initialization"}
<script>
    const switchInput = document.getElementById('is_excluded');
    switchInput.addEventListener('change', switchChange);

    function switchChange(event) {
        const switchElement = event.target;
        const valeurSwitch = switchElement.checked;

        console.log("La valeur du switch a changé : ", valeurSwitch);

        $.ajax({
            url: "{url path="/admin/doofinder/excluded/product/$product_id"}",
            method: 'POST',
            data: { is_excluded: valeurSwitch }
        });
    }
</script>
{/block}
